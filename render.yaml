services:
  # Base de Datos Compartida
  # Nota: Prisma en Frontend y SQLAlchemy en Backend pueden compartir la misma base de datos.
  # Prisma crea tablas para el Frontend (Session), y Alembic para el Backend.

  # Backend FastAPI Service
  - type: web
    name: shopify-credit-app-backend
    env: python
    buildCommand: "cd backend && pip install poetry && poetry config virtualenvs.create false && poetry install --only main"
    startCommand: "cd backend && alembic upgrade head && cd src && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: credit-app-db
          property: connectionString
      - key: FRONTEND_URL
        # Reemplazar con la URL final del frontend en Render cuando se genere
        value: "https://shopify-credit-app-frontend.onrender.com"
      - key: INTERNAL_AUTH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_SECRET
        generateValue: true
      - key: JWT_REFRESH_TOKEN_SECRET
        generateValue: true
      - key: PUBLIC_PAGE_URL
        value: "https://shopify-credit-app-page.onrender.com/pago"
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false

  # Página Pública de Pago (React + Vite)
  - type: web
    name: shopify-credit-app-page
    env: static
    buildCommand: "cd page && npm install && npm run build"
    staticPublishPath: page/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://shopify-credit-app-backend.onrender.com/api"

  # Frontend Remix Service
  - type: web
    name: shopify-credit-app-frontend
    env: node
    buildCommand: "cd web && npm install && npm run build"
    startCommand: "cd web && npm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: credit-app-db
          property: connectionString
      - key: BACKEND_URL
        # Reemplazar con la URL final del backend en Render cuando se genere
        value: "https://shopify-credit-app-backend.onrender.com"
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: "write_products,read_products,write_customers,read_customers,write_orders,read_orders"

databases:
  - name: credit-app-db
    databaseName: creditapp
    user: credituser
